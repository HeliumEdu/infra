name: "Release Legacy Frontend"

run-name: "Release `${{ inputs.version }}`"

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
  workflow_call:
    inputs:
      version:
        type: string
        required: true

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  release:
    name: Release Legacy Frontend

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      FRONTEND_ROLLBAR_CLIENT_ITEM_ACCESS_TOKEN: ${{ secrets.FRONTEND_ROLLBAR_CLIENT_ITEM_ACCESS_TOKEN }}
      PLATFORM: amd64

    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.HELIUM_BOT_APP_ID }}
          private-key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
      - name: Set up Python "3.12"
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup git
        run: |
          git config --global user.name "GitHub Release Bot"
          git config --global user.email "support@heliumedu.com"
      - name: Install GitHub SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY_GITHUB }}
          known_hosts: ${{ secrets.KNOWN_HOSTS_GITHUB }}
          if_key_exists: replace
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Install dependencies
        run: make install
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build frontend-legacy
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: TAG_VERSION=${{ inputs.version }} helium-cli build-release ${{ inputs.version }} --projects frontend-legacy
      - name: Publish frontend-legacy artifacts
        run: TAG_VERSION=${{ inputs.version }} make -C projects/frontend-legacy publish
      - name: Dump Docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2