name: "Sync Support Articles"

run-name: "Sync Support Articles"

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: helium-sync-support-articles

jobs:
  sync:
    name: Sync

    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HELIUM_BOT_APP_ID }}
          private-key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}
          skip-token-revoke: true

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch support articles
        run: python scripts/fetch_support_articles.py

      - name: Get GitHub App bot user ID
        id: get-bot-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.get-bot-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add -A support/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync Helium support articles from Freshdesk"
            git push
          fi
